      flex-direction: column;
      gap: 12px;

      color: #1d3557;
    }

    h3 {

      font-size: 17px;
    }

    p {

      line-height: 1.55;
    }

    .small {
      font-size: 13px;
      color: #52616b;
      line-height: 1.45;
    }

    .btn-area {
      margin-top: auto;
      display: grid;
      gap: 9px;
    }

      width: 100%;
      min-height: 48px;
      padding: 10px 12px;
      border: 3px solid #1d3557;
      border-radius: 12px;
      background: #fff3b0;
      color: #1f2933;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 3px 0 #588157;
      touch-action: manipulation;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #588157;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .sub {
      background: #e3f2fd;
    }

    .danger {
      background: #ffe0e0;
    }

    .area-button {
      text-align: left;
      background: #ffffff;
    }

    .clear {
      background: #d8f3dc;
    }

    .battle-field {
      background: linear-gradient(#90dbf4 0 48%, #b7e4c7 49% 100%);
      border: 3px solid #1d3557;
      border-radius: 14px;
      padding: 12px;
      min-height: 245px;
      position: relative;
    }

    .status {
      background: #ffffff;
      border: 2px solid #1d3557;
      border-radius: 10px;
      padding: 8px;
      font-size: 13px;
    }

    .enemy-status {
      width: 58%;
      margin-bottom: 18px;
    }

    .player-status {
      width: 58%;
      margin-left: auto;
      margin-top: 16px;
    }

    .monster {
      width: 92px;
      height: 92px;
      border: 3px solid #1d3557;
      border-radius: 18px;
      background: #f77f00;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 46px;
      margin-left: auto;
      margin-right: 22px;
      box-shadow: inset -7px -7px 0 rgba(0,0,0,0.12);
    }

    .buddy {
      width: 90px;
      height: 90px;
      border: 3px solid #1d3557;
      border-radius: 50%;
      background: #95d5b2;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 42px;
      margin-left: 24px;
      box-shadow: inset -7px -7px 0 rgba(0,0,0,0.12);
    }

    .hp-wrap {
      height: 15px;
      border: 2px solid #1d3557;
      border-radius: 999px;
      background: #e5e5e5;
      overflow: hidden;
      margin-top: 5px;
    }

    .hp {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #52b788, #d9ed92);
      transition: width 0.2s;
    }

    .question-box {
      background: #ffffff;
      border: 3px solid #1d3557;
      border-radius: 14px;
      padding: 12px;
    }

    .question {
      font-size: 16px;
      font-weight: 700;
    }

    .choices {
      display: grid;
      gap: 8px;
    }

    .choice {
      background: #ffffff;
      text-align: left;
      font-size: 15px;
    }

    .choice.correct {
      background: #caffbf;
    }

    .choice.wrong {
      background: #ffccd5;
    }

    .message {
      background: #fff8d6;
      border: 3px solid #1d3557;
      border-radius: 14px;
      padding: 12px;
      line-height: 1.55;

      border-radius: 999px;
      background: #fff8d6;

      margin: 2px;

      font-weight: 700;

      display: flex;
      justify-content: space-between;
      align-items: center;

    }

      min-height: 36px;
      padding: 5px 10px;
      font-size: 12px;
      border-width: 2px;

</head>

        question: "依正不二を生活に生かす考え方として近いものはどれですか？",
        choices: ["自分の変革が環境にもよい影響を与える", "環境は絶対に変わらない", "周囲だけを責める", "自分の行動は無意味"],
        answer: 0,
        explanation: "依正不二は、自分と環境が深く結びつくことを示します。"
      },
      {
        id: 39,
        area: "tower",
        question: "信行学の関係として適切なものはどれですか？",
        choices: ["信・行・学を一体で進める", "学だけで実践しない", "行だけで学ばない", "信心と生活は無関係"],
        answer: 0,
        explanation: "信行学は、信じる心、実践、学びを一体で進めることが大切です。"
      },
      {
        id: 40,
        area: "tower",
        question: "宿命転換の理解として近いものはどれですか？",
        choices: ["苦難を成長と使命に変えること", "過去を嘆き続けること", "何もしないこと", "人のせいにすること"],
        answer: 0,
        explanation: "宿命転換とは、苦しみや課題を乗り越え、成長と使命へ変えていく考え方です。"
      }
    ];

    let state = {
      clearedAreas: [],
      totalAnswers: 0,
      totalCorrect: 0,
      wrongQuestionIds: []
    };

    let battle = null;

    const app = document.getElementById("app");

    function saveGame() {
      localStorage.setItem(SAVE_KEY, JSON.stringify(state));
    }

    function loadGame() {
      const data = localStorage.getItem(SAVE_KEY);
      if (data) {
        try {
          const loaded = JSON.parse(data);
          state.clearedAreas = Array.isArray(loaded.clearedAreas) ? loaded.clearedAreas : [];
          state.totalAnswers = Number(loaded.totalAnswers) || 0;
          state.totalCorrect = Number(loaded.totalCorrect) || 0;
          state.wrongQuestionIds = Array.isArray(loaded.wrongQuestionIds) ? loaded.wrongQuestionIds : [];
        } catch (e) {
          state = {
            clearedAreas: [],
            totalAnswers: 0,
            totalCorrect: 0,
            wrongQuestionIds: []
          };
        }
      }
    }

    function resetGame() {
      if (confirm("保存データを消して、はじめから遊びますか？")) {
        localStorage.removeItem(SAVE_KEY);
        state = {
          clearedAreas: [],
          totalAnswers: 0,
          totalCorrect: 0,
          wrongQuestionIds: []
        };
        saveGame();
        showAreaSelect();
      }
    }

    function showTitle() {
      loadGame();

      app.innerHTML = `
        <div class="screen">
          <div class="box title-box">
            <h1>ミョウホウ・クエスト</h1>
            <p><strong>クローバードと希望の教学バトル</strong></p>
            <p class="small">スマホ向け・教学クイズRPG</p>
          </div>

          <div class="box">
            <p>相棒のクローバードと一緒に、まよいモンスターとクイズバトル！</p>
            <p>正解すると敵に20ダメージ。不正解だと自分に15ダメージです。</p>
          </div>

          <div class="btn-area">
            <button onclick="showAreaSelect()">つづきから / はじめる</button>
            <button class="sub" onclick="showStats()">成績を見る</button>
            <button class="danger" onclick="resetGame()">はじめから</button>
          </div>
        </div>
      `;
    }

    function showAreaSelect() {
      loadGame();

      const normalAreas = areas.filter(a => !a.final);
      const finalUnlocked = normalAreas.every(a => state.clearedAreas.includes(a.id));

      let html = `
        <div class="screen">
          <div class="top">
            <strong>エリア選択</strong>
            <button onclick="showTitle()">タイトル</button>
          </div>

          <div class="box">
            <h2>冒険するエリアを選んでください</h2>
            <p class="small">6つのエリアをすべてクリアすると、マヨイの塔が解放されます。</p>
          </div>
      `;

      areas.forEach(area => {
        const cleared = state.clearedAreas.includes(area.id);
        const locked = area.final && !finalUnlocked;

        html += `
          <button
            class="area-button ${cleared ? "clear" : ""}"
            ${locked ? "disabled" : ""}
            onclick="startBattle('${area.id}')"
          >
            ${cleared ? "✅ " : ""}${area.name}<br>
            <span class="small">
              ボス：${area.boss}${locked ? " / まだ解放されていません" : ""}
            </span>
          </button>
        `;
      });

      html += `
          <div class="btn-area">
            <button class="sub" onclick="showStats()">成績を見る</button>
          </div>
        </div>
      `;

      app.innerHTML = html;
    }

    function startBattle(areaId) {
      const area = areas.find(a => a.id === areaId);
      const areaQuestions = questions.filter(q => q.area === areaId);

      battle = {
        area: area,
        playerHp: 100,
        enemyHp: area.hp,
        questions: shuffleArray(areaQuestions),
        index: 0,
        currentQuestion: null,
        answered: false,
        selected: null,
        message: "バトル開始！ 問題に答えましょう。"
      };

      nextQuestion();
    }

    function nextQuestion() {
      if (!battle) return;

      if (battle.enemyHp <= 0) {
        showVictory();
        return;
      }

      if (battle.playerHp <= 0) {
        showDefeat();
        return;
      }

      if (battle.index >= battle.questions.length) {
        battle.questions = shuffleArray(battle.questions);
        battle.index = 0;
      }

      battle.currentQuestion = battle.questions[battle.index];
      battle.index++;
      battle.answered = false;
      battle.selected = null;
      battle.message = "クローバード「落ち着いて選びましょう。」";

      renderBattle();
    }

    function renderBattle() {
      const q = battle.currentQuestion;
      const enemyPercent = Math.max(0, Math.round((battle.enemyHp / battle.area.hp) * 100));
      const playerPercent = Math.max(0, Math.round((battle.playerHp / 100) * 100));

      let choicesHtml = "";
      q.choices.forEach((choice, index) => {
        let cls = "choice";

        if (battle.answered) {
          if (index === q.answer) {
            cls += " correct";
          } else if (index === battle.selected) {
            cls += " wrong";
          }
        }

        choicesHtml += `
          <button
            class="${cls}"
            ${battle.answered ? "disabled" : ""}
            onclick="answerQuestion(${index})"
          >
            ${choice}
          </button>
        `;
      });

      app.innerHTML = `
        <div class="screen">
          <div class="top">
            <strong>${battle.area.name}</strong>
            <button onclick="showAreaSelect()">にげる</button>
          </div>

          <div class="battle-field">
            <div class="status enemy-status">
              <strong>${battle.area.boss}</strong>
              <div class="hp-wrap">
                <div class="hp" style="width:${enemyPercent}%"></div>
              </div>
              <span class="small">HP ${battle.enemyHp} / ${battle.area.hp}</span>
            </div>

            <div class="monster">${battle.area.mark}</div>

            <div class="buddy">🍀</div>

            <div class="status player-status">
              <strong>クローバード</strong>
              <div class="hp-wrap">
                <div class="hp" style="width:${playerPercent}%"></div>
              </div>
              <span class="small">HP ${battle.playerHp} / 100</span>
            </div>
          </div>

          <div class="question-box">
            <span class="tag">第${battle.index}問</span>
            <p class="question">${q.question}</p>
          </div>

          <div class="choices">
            ${choicesHtml}
          </div>

          <div class="message">
            ${battle.message}
          </div>

          <div class="btn-area">
            ${battle.answered ? `<button onclick="nextQuestion()">次へ</button>` : ""}
          </div>
        </div>
      `;
    }

    function answerQuestion(choiceIndex) {
      if (!battle || battle.answered) return;

      const q = battle.currentQuestion;
      const correct = choiceIndex === q.answer;

      battle.answered = true;
      battle.selected = choiceIndex;

      state.totalAnswers++;

      if (correct) {
        state.totalCorrect++;
        battle.enemyHp -= 20;
        if (battle.enemyHp < 0) battle.enemyHp = 0;

        removeWrongQuestion(q.id);

        battle.message = `
          <strong>正解！</strong><br>
          ${battle.area.boss}に20ダメージ！<br>
          <span class="small">${q.explanation}</span>
        `;
      } else {
        battle.playerHp -= 15;
        if (battle.playerHp < 0) battle.playerHp = 0;

        addWrongQuestion(q.id);

        battle.message = `
          <strong>不正解…！</strong><br>
          正解は「${q.choices[q.answer]}」です。<br>
          クローバードは15ダメージを受けました。<br>
          <span class="small">${q.explanation}</span>
        `;
      }

      saveGame();
      renderBattle();
    }

    function showVictory() {
      if (!state.clearedAreas.includes(battle.area.id)) {
        state.clearedAreas.push(battle.area.id);
      }

      saveGame();

      const isFinal = battle.area.id === "tower";

      app.innerHTML = `
        <div class="screen">
          <div class="box title-box">
            <h1>${isFinal ? "完全クリア！" : "勝利！"}</h1>
            <p><strong>${battle.area.boss}を倒しました！</strong></p>
          </div>

          <div class="box">
            <p>クローバード「すごいです…！ また一つ、教学の力が増えましたね。」</p>
            ${isFinal ? "<p>まおうマヨイを倒し、希望の教学バトルを制しました！</p>" : ""}
          </div>

          <div class="btn-area">
            <button onclick="showAreaSelect()">エリア選択へ</button>
            <button class="sub" onclick="showStats()">成績を見る</button>
          </div>
        </div>
      `;
    }

    function showDefeat() {
      app.innerHTML = `
        <div class="screen">
          <div class="box title-box">
            <h1>敗北…</h1>
            <p><strong>クローバードは力尽きました</strong></p>
          </div>

          <div class="box">
            <p>クローバード「えっと…大丈夫です。間違えたところを覚え直せば、きっと前に進めます。」</p>
          </div>

          <div class="btn-area">
            <button onclick="startBattle('${battle.area.id}')">もう一度挑戦</button>
            <button class="sub" onclick="showAreaSelect()">エリア選択へ</button>
          </div>
        </div>
      `;
    }

    function showStats() {
      loadGame();

      const rate = state.totalAnswers === 0
        ? 0
        : Math.round((state.totalCorrect / state.totalAnswers) * 100);

      const clearedNames = state.clearedAreas
        .map(id => {
          const area = areas.find(a => a.id === id);
          return area ? area.name : "";
        })
        .filter(Boolean);

      app.innerHTML = `
        <div class="screen">
          <div class="top">
            <strong>成績</strong>
            <button onclick="showTitle()">タイトル</button>
          </div>

          <div class="box">
            <h2>冒険の記録</h2>
            <p>総回答数：${state.totalAnswers}</p>
            <p>総正解数：${state.totalCorrect}</p>
            <p>正答率：${rate}%</p>
            <p>間違えた問題数：${state.wrongQuestionIds.length}</p>
          </div>

          <div class="box">
            <h3>クリア済みエリア</h3>
            <p>${clearedNames.length ? clearedNames.join("、") : "まだありません"}</p>
          </div>

          <div class="btn-area">
            <button onclick="showAreaSelect()">エリア選択へ</button>
            <button class="danger" onclick="resetGame()">保存データを消す</button>
          </div>
        </div>
      `;
    }

    function addWrongQuestion(id) {
      if (!state.wrongQuestionIds.includes(id)) {
        state.wrongQuestionIds.push(id);
      }
    }

    function removeWrongQuestion(id) {
      state.wrongQuestionIds = state.wrongQuestionIds.filter(wid => wid !== id);
    }

    function shuffleArray(array) {
      const copied = array.slice();
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = copied[i];
        copied[i] = copied[j];
        copied[j] = temp;
      }
      return copied;
    }

    showTitle();
  </script>
</body>
</html>
